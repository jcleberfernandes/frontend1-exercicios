<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio-05</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="container">
        <h1>Buscar Imagem de Cachorro por Raca</h1>
            <form id="breed-form" class="card">
            <label for="breed">Digite a breed (raca em ingles):</label>
            <input
                id="breed"
                name="breed"
                type="text"
                placeholder="ex.: husky"
                autocomplete="off"
                required
            >
            <button type="submit">Buscar imagem</button>
        </form>

        <p id="feedback" class="feedback" aria-live="polite"></p>

        <section id="result" class="result">
            <h2>Resultado</h2>
        </section>
    </main>

    <script src="./script.js"></script>
</body>
</html>
