<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio-09</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page">
      <section data-aos="fade-up-right" class="splide" aria-label="Galeria de imagens">
    <div class="splide__track">
        <ul class="splide__list">
            <li class="splide__slide">
                <a href="https://picsum.photos/id/1015/1200/800" class="glightbox">
                    <img src="https://picsum.photos/id/1015/1200/800" alt="Paisagem com montanhas">
                </a>
            </li>
            <li class="splide__slide">
                <a href="https://picsum.photos/id/1025/1200/800" class="glightbox">
                    <img src="https://picsum.photos/id/1025/1200/800" alt="Cachorro olhando para a camera">
                </a>
            </li>
            <li class="splide__slide">
                <a href="https://picsum.photos/id/1035/1200/800" class="glightbox">
                    <img src="https://picsum.photos/id/1035/1200/800" alt="Estrada entre arvores">
                </a>
            </li>
            <li class="splide__slide">
                <a href="https://picsum.photos/id/1043/1200/800" class="glightbox">
                    <img src="https://picsum.photos/id/1043/1200/800" alt="Vista do mar com pedras">
                </a>
            </li>
        </ul>
    </div>
</section>
      

    </main>
    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
